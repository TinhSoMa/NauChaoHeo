<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 320px;
        padding: 10px;
        font-family: sans-serif;
      }
      textarea {
        width: 100%;
        height: 120px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      button {
        width: 48%;
        padding: 8px;
        cursor: pointer;
      }
      #btnStop {
        background-color: #ff4444;
        color: white;
        border: none;
      }
      #btnStart {
        background-color: #4caf50;
        color: white;
        border: none;
      }
      #btnDownload {
        color: white;
        border: none;
      }
      #btnClear {
        color: white;
        border: none;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
      label {
        display: block;
        margin-top: 5px;
        margin-bottom: 3px;
        font-size: 13px;
      }
      .file-list {
        max-height: 140px;
        overflow-y: auto;
        border: 1px solid #ddd;
        padding: 6px;
        font-size: 11px;
        background: #f9f9f9;
        margin-bottom: 10px;
      }
      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 6px;
        border-bottom: 1px solid #eee;
        font-size: 11px;
        gap: 6px;
      }
      .file-item:last-child {
        border-bottom: none;
      }
      .file-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #333;
      }
      .file-badge {
        flex-shrink: 0;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }
      .badge-pending     { background: #f5f5f5; color: #777; }
      .badge-translating { background: #bbdefb; color: #1565c0; animation: blink 1.2s ease-in-out infinite; }
      .badge-done        { background: #c8e6c9; color: #2e7d32; }
      .badge-error       { background: #ffcdd2; color: #b71c1c; }
      .file-item.translating {
        background: #e3f2fd;
        font-weight: bold;
        animation: blink 1.2s ease-in-out infinite;
      }
      @keyframes blink { 50% { opacity: 0.5; } }
    </style>
  </head>
  <body>
    <h3>Cấu hình Dịch Subtitle</h3>

    <label>Nhà cung cấp:</label>
    <select
      id="providerSelect"
      style="
        width: 100%;
        padding: 5px;
        margin-bottom: 10px;
        box-sizing: border-box;
      "
    >
      <option value="gemini">Gemini</option>
      <option value="grok">Grok</option>
    </select>

    <label>Chế độ nhập dữ liệu:</label>
    <div style="margin-bottom: 10px;">
      <input type="radio" id="modeFile" name="inputMode" value="file" checked>
      <label for="modeFile" style="display: inline; margin-right: 15px;">Chọn File lẻ</label>
      <input type="radio" id="modeFolder" name="inputMode" value="folder">
      <label for="modeFolder" style="display: inline;">Chọn Thư mục</label>
    </div>

    <div id="fileInputWrapper">
      <label>Chọn batch file .txt (mỗi file 50 dòng):</label>
      <input
        type="file"
        id="fileInput"
        accept=".txt"
        multiple
        style="width: 100%; margin-bottom: 10px"
      />
    </div>

    <div id="folderInputWrapper" style="display: none;">
      <label>Chọn thư mục chứa các dự án (hoặc thư mục dự án):</label>
      <input
        type="file"
        id="folderInput"
        webkitdirectory
        multiple
        style="width: 100%; margin-bottom: 5px"
      />
      <div style="font-size: 11px; color: #d84315; margin-bottom: 10px; line-height: 1.3;">
        Tự động tìm file .txt trong:<br><b>[tên_dự_án]/caption_output/text/</b>
      </div>
    </div>

    <div
      id="fileStatus"
      style="font-size: 11px; color: #666; margin-bottom: 10px"
    >
      Chưa chọn file
    </div>

    <div id="fileListContainer" style="display: none; margin-bottom: 10px;">
      <label>Danh sách batch file đã chọn:</label>
      <div id="fileList" class="file-list"></div>
      <div id="fileSummary" style="font-size: 11px; color: #666;">
        Tổng batch: 0
      </div>
    </div>

    <!-- Copy Only Mode (không dịch, chỉ lưu text gốc) -->
    <div style="margin-bottom: 10px; display: flex; align-items: center;">
      <input type="checkbox" id="copyOnlyMode" style="margin-right: 5px;">
      <label for="copyOnlyMode" style="margin: 0; display: inline;">📋 Chỉ copy (không dịch qua Gemini/Grok)</label>
    </div>



    <label>Số batch muốn dịch:</label>
    <input
      type="number"
      id="batchLimit"
      value="50"
      min="1"
      max="10000"
      style="
        width: 100%;
        padding: 5px;
        margin-bottom: 15px;
        box-sizing: border-box;
      "
    />

    <label>Thời gian nghỉ giữa 2 batch (giây):</label>
    <input
      type="number"
      id="promptDelay"
      value="10"
      min="1"
      max="300"
      style="
        width: 100%;
        padding: 5px;
        margin-bottom: 10px;
        box-sizing: border-box;
      "
    />

    <div id="alwaysOnTopSection" style="margin-bottom: 10px; display: flex; align-items: center;">
      <input type="checkbox" id="alwaysOnTop" checked style="margin-right: 5px;">
      <label for="alwaysOnTop" style="margin: 0; display: inline;">Luôn giữ cửa sổ trên cùng (Always On Top)</label>
    </div>

    <div
      style="display: flex; justify-content: space-between; margin-bottom: 5px"
    >
      <button id="btnStart">Bắt đầu chạy</button>
      <button id="btnStop">Dừng lại</button>
    </div>

    <hr />
    <div style="display: flex; justify-content: space-between">
      <button id="btnDownload" style="background: #2196f3">
        Tải JSONL (.jsonl)
      </button>
      <button id="btnClear" style="background: #ff9800">Xóa bộ nhớ</button>
    </div>

    <div class="status" id="statusLog">Trạng thái: Sẵn sàng</div>

    <script src="popup.js"></script>
  </body>
</html>
