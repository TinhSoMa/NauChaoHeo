<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 320px;
        padding: 10px;
        font-family: sans-serif;
      }
      textarea {
        width: 100%;
        height: 120px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      button {
        width: 48%;
        padding: 8px;
        cursor: pointer;
      }
      #btnStop {
        background-color: #ff4444;
        color: white;
        border: none;
      }
      #btnStart {
        background-color: #4caf50;
        color: white;
        border: none;
      }
      #btnDownload {
        color: white;
        border: none;
      }
      #btnClear {
        color: white;
        border: none;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
      label {
        display: block;
        margin-top: 5px;
        margin-bottom: 3px;
        font-size: 13px;
      }
      .file-list {
        max-height: 140px;
        overflow-y: auto;
        border: 1px solid #ddd;
        padding: 6px;
        font-size: 11px;
        background: #f9f9f9;
        margin-bottom: 10px;
      }
      .file-item {
        padding: 3px 0;
        border-bottom: 1px solid #eee;
      }
      .file-item:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <h3>Cấu hình Dịch Subtitle</h3>

    <label>Chọn batch file .txt (mỗi file 50 dòng):</label>
    <input
      type="file"
      id="fileInput"
      accept=".txt"
      multiple
      style="width: 100%; margin-bottom: 10px"
    />

    <div
      id="fileStatus"
      style="font-size: 11px; color: #666; margin-bottom: 10px"
    >
      Chưa chọn file
    </div>

    <div id="fileListContainer" style="display: none; margin-bottom: 10px;">
      <label>Danh sách batch file đã chọn:</label>
      <div id="fileList" class="file-list"></div>
      <div id="fileSummary" style="font-size: 11px; color: #666;">
        Tổng batch: 0
      </div>
    </div>

    <!-- Copy Only Mode (không dịch, chỉ lưu text gốc) -->
    <div style="margin-bottom: 10px; display: flex; align-items: center;">
      <input type="checkbox" id="copyOnlyMode" style="margin-right: 5px;">
      <label for="copyOnlyMode" style="margin: 0; display: inline;">📋 Chỉ copy (không dịch qua Gemini)</label>
    </div>

    <label>Prompt mẫu ({{TEXT}} là nội dung batch):</label>
    <textarea id="promptTemplate">
Bạn là một dịch giả chuyên nghiệp. Hãy dịch sang tiếng Việt.

QUY TẮC:
- Chỉ trả về JSON thuần (không thêm giải thích).
- Schema JSON:
{
  "translations": [
    {"index": 1, "original": "...", "translated": "..."}
  ]
}

Dữ liệu cần dịch (đã đánh số):

{{TEXT}}
    </textarea>

    <label>Số batch muốn dịch:</label>
    <input
      type="number"
      id="batchLimit"
      value="50"
      min="1"
      max="10000"
      style="
        width: 100%;
        padding: 5px;
        margin-bottom: 10px;
        box-sizing: border-box;
      "
    />

    <div id="alwaysOnTopSection" style="margin-bottom: 10px; display: flex; align-items: center;">
      <input type="checkbox" id="alwaysOnTop" checked style="margin-right: 5px;">
      <label for="alwaysOnTop" style="margin: 0; display: inline;">Luôn giữ cửa sổ trên cùng (Always On Top)</label>
    </div>

    <div
      style="display: flex; justify-content: space-between; margin-bottom: 5px"
    >
      <button id="btnStart">Bắt đầu chạy</button>
      <button id="btnStop">Dừng lại</button>
    </div>

    <hr />
    <div style="display: flex; justify-content: space-between">
      <button id="btnDownload" style="background: #2196f3">
        Tải JSONL (.jsonl)
      </button>
      <button id="btnClear" style="background: #ff9800">Xóa bộ nhớ</button>
    </div>

    <div class="status" id="statusLog">Trạng thái: Sẵn sàng</div>

    <script src="popup.js"></script>
  </body>
</html>
